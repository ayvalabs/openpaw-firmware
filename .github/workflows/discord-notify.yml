name: discord-notify

# Posts a build-log message to the OpenPaw Discord on every push to main
# and every published release. Copy this file into each PUBLIC source repo.
#
# Setup: Discord → Server Settings → Integrations → Webhooks → New Webhook,
# copy the URL, then add it as repo secret DISCORD_WEBHOOK_URL.
#
# (No-code alternative: paste the Discord webhook URL into GitHub repo
#  Settings → Webhooks with "/github" appended — Discord renders it natively.
#  This Action gives prettier, custom messages instead.)

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Post to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO: ${{ github.event.repository.name }}
          ACTOR: ${{ github.actor }}
          EVENT: ${{ github.event_name }}
          MSG: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          TAG: ${{ github.event.release.tag_name }}
          REL_URL: ${{ github.event.release.html_url }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL not set — skipping."; exit 0
          fi
          if [ "$EVENT" = "release" ]; then
            CONTENT="🚀 **$REPO** released **$TAG**"$'\n'"$REL_URL"
          else
            CONTENT="🐾 **$REPO** — $MSG"$'\n'"by \`$ACTOR\` • $COMMIT_URL"
          fi
          curl -sS -H "Content-Type: application/json" \
            -d "$(jq -nc --arg c "$CONTENT" '{content:$c}')" \
            "$DISCORD_WEBHOOK_URL"
